<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-labelledby="title-selo-ranking desc-selo-ranking">
  <title id="title-selo-ranking">Selo Ranking</title>
  <desc id="desc-selo-ranking">Pódio triangular abstrato para ranking.</desc>

  <defs>
    <radialGradient id="core-selo-ranking" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#20d3ee" stop-opacity="0.7"/>
      <stop offset="0.45" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#07090f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-selo-ranking" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#20d3ee"/>
      <stop offset="0.52" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow-selo-ranking" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="#07090f"/>
  <rect x="12" y="12" width="776" height="776" rx="22" fill="none" stroke="#d5e2ff" stroke-opacity="0.12"/>

  <rect width="800" height="800" fill="url(#core-selo-ranking)" opacity="0.36"/>
  <g transform="translate(400 400)" filter="url(#glow-selo-ranking)">
    <circle r="270" fill="none" stroke="#d4af37" stroke-opacity="0.48" stroke-width="5"/>
    <path d="M-210 150 0-210 210 150Z" fill="none" stroke="#20d3ee" stroke-opacity="0.54" stroke-width="5"/><path d="M-120 160V40H-30V160M30 160V-40H120V160" fill="none" stroke="#d4af37" stroke-width="5"/>
    <text x="0" y="42" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="118" font-weight="900" fill="#f5f7fb">▲</text>
  </g>
</svg>
