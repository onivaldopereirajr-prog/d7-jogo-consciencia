<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-labelledby="title-portal-c-observacao desc-portal-c-observacao">
  <title id="title-portal-c-observacao">Portal C</title>
  <desc id="desc-portal-c-observacao">Olho abstrato geométrico para observação.</desc>

