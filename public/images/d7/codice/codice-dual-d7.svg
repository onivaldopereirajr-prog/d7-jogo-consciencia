<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-labelledby="title-codice desc-codice">
  <title id="title-codice">Códice Dual D7</title>
  <desc id="desc-codice">Símbolo central do Códice Dual com trilhas hebraica e sânscrita.</desc>

  <defs>
    <radialGradient id="core-codice" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#20d3ee" stop-opacity="0.7"/>
      <stop offset="0.45" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#07090f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-codice" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#20d3ee"/>
      <stop offset="0.52" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow-codice" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="#07090f"/>
  <rect x="12" y="12" width="776" height="776" rx="22" fill="none" stroke="#d5e2ff" stroke-opacity="0.12"/>

  <rect width="800" height="800" fill="url(#core-codice)" opacity="0.5"/>
  <g transform="translate(400 400)" filter="url(#glow-codice)">
    <circle r="264" fill="none" stroke="#20d3ee" stroke-opacity="0.34" stroke-width="4"/>
    <circle r="190" fill="none" stroke="#d4af37" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M-248-40C-120-160-20-160 0-44C20-160 120-160 248-40" fill="none" stroke="#20d3ee" stroke-width="5" stroke-opacity="0.62"/>
    <path d="M-248 40C-120 160-20 160 0 44C20 160 120 160 248 40" fill="none" stroke="#a78bfa" stroke-width="5" stroke-opacity="0.62"/>
    <text x="0" y="34" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="88" font-weight="900" fill="#f5f7fb">D7</text>
    <text x="-155" y="15" text-anchor="middle" font-size="60" fill="#d4af37">אור</text>
    <text x="155" y="18" text-anchor="middle" font-size="55" fill="#a78bfa">ॐ</text>
  </g>
</svg>
