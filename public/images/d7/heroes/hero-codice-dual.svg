<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title-hero desc-hero">
  <title id="title-hero">Hero Códice Dual D7</title>
  <desc id="desc-hero">Painel escuro de portal D7 com circuito, Alef e Om.</desc>

  <defs>
    <radialGradient id="core-hero" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#20d3ee" stop-opacity="0.7"/>
      <stop offset="0.45" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#07090f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold-hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#20d3ee"/>
      <stop offset="0.52" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow-hero" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="#07090f"/>
  <rect x="12" y="12" width="1176" height="776" rx="22" fill="none" stroke="#d5e2ff" stroke-opacity="0.12"/>

  <rect width="1200" height="800" fill="url(#core-hero)" opacity="0.55"/>
  
  <g opacity=".18" stroke="#20d3ee" stroke-width="1">
    <path d="M80 120H1120M80 680H1120M160 80V720M1040 80V720"/>
    <path d="M240 160H420V92M960 640H780V708"/>
    <path d="M92 260H230M1108 540H970"/>
  </g>
  <g transform="translate(600 400)" filter="url(#glow-hero)">
    <circle r="206" fill="none" stroke="#20d3ee" stroke-opacity="0.5" stroke-width="3"/>
    <circle r="148" fill="none" stroke="#d4af37" stroke-opacity="0.58" stroke-width="2" stroke-dasharray="14 18"/>
    <path d="M0-260 225-130 225 130 0 260-225 130-225-130Z" fill="none" stroke="#a78bfa" stroke-opacity="0.42" stroke-width="3"/>
    <text x="0" y="32" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="96" font-weight="900" fill="#f5f7fb">D7</text>
    <text x="-224" y="14" text-anchor="middle" font-size="78" fill="#d4af37">א</text>
    <text x="224" y="18" text-anchor="middle" font-size="70" fill="#a78bfa">ॐ</text>
  </g>
  <g stroke="url(#gold-hero)" stroke-width="4" stroke-linecap="round" opacity="0.72">
    <path d="M152 400H350M850 400h198M600 88v126M600 586v126"/>
    <path d="M280 214l92 92M920 214l-92 92M280 586l92-92M920 586l-92-92"/>
  </g>
